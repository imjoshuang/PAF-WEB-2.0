<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="PAF_Seal.png">
    <title>Exhibit Section - PAF Museum</title>
    <style>
        body { font-family: 'Poppins', sans-serif !important; }

        /* Artifact card */
        .artifact-card { transition: box-shadow 0.2s ease, transform 0.2s ease; }
        .artifact-card:hover { box-shadow: 0 20px 40px -8px rgba(0,0,0,0.14); transform: translateY(-4px); }
        .artifact-card img { transition: transform 0.5s ease; }
        .artifact-card:hover img { transform: scale(1.07); }

        /* Detail modal animation */
        #exhibitDetailModal { transition: opacity 0.2s ease; }
        #exhibitDetailModal.show { opacity: 1 !important; }
        #exhibitDetailModal .modal-inner {
            transform: translateY(20px) scale(0.97);
            transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.2s ease;
            opacity: 0;
        }
        #exhibitDetailModal.show .modal-inner { transform: translateY(0) scale(1); opacity: 1; }

        /* Skeleton shimmer */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 1.5rem; }
        @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

        /* Stagger fade-in for cards */
        .artifact-card { opacity: 0; animation: cardIn 0.3s ease forwards; }
        @keyframes cardIn { to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <!-- Nav -->
    <nav class="bg-[#0038A8] text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center justify-between">
            <a href="exhibits.html" class="flex items-center gap-2 font-bold text-sm hover:opacity-80 transition-opacity group">
                <span class="group-hover:-translate-x-1 transition-transform inline-block">←</span>
                <span class="hidden sm:inline uppercase tracking-widest text-xs">Back to Exhibitions</span>
            </a>
            <div class="flex items-center gap-3">
                <img src="PAF_Seal.png" alt="PAF" class="w-8 h-8">
                <span id="sectionTitleHeader" class="font-black uppercase tracking-widest text-xs truncate max-w-[160px]">Collection</span>
            </div>
        </div>
    </nav>

    <!-- Section Header -->
    <header class="bg-white border-b border-gray-100 py-12">
        <div class="max-w-[1400px] mx-auto px-8">
            <span class="text-[10px] font-black uppercase text-blue-600 tracking-[0.2em] mb-2 block">Collection Archive</span>
            <h1 id="sectionName" class="text-4xl font-black text-slate-900 uppercase italic">Loading...</h1>
            <p id="sectionDesc" class="text-slate-500 mt-2 max-w-2xl text-sm leading-relaxed"></p>
        </div>
    </header>

    <!-- Artifacts -->
    <main class="max-w-[1400px] mx-auto p-8">
        <div id="artifactsCounter" class="text-[10px] font-black text-gray-400 mb-8 uppercase tracking-widest">Scanning artifacts...</div>
        <div id="artifactsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="skeleton h-64"></div>
            <div class="skeleton h-64"></div>
            <div class="skeleton h-64"></div>
            <div class="skeleton h-64"></div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="exhibitDetailModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[110] hidden items-center justify-center p-4" style="opacity:0">
        <div class="modal-inner bg-white rounded-3xl max-w-4xl w-full overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
            <div class="md:w-1/2 bg-gray-100 relative" style="min-height:260px">
                <img id="detailImage" src="" alt="" class="w-full h-full object-cover absolute inset-0">
                <button onclick="closeDetailModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/70 text-white p-2 rounded-full transition-colors z-10 text-sm">✕</button>
                <!-- Status badge on image -->
                <div class="absolute bottom-4 left-4">
                    <span id="detailStatusBadge" class="px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider backdrop-blur-sm"></span>
                </div>
            </div>
            <div class="md:w-1/2 p-8 overflow-y-auto flex flex-col">
                <div>
                    <span id="detailCategory" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-wider inline-block mb-3"></span>
                    <h2 id="detailName" class="text-2xl md:text-3xl font-black text-slate-900 uppercase italic mb-4 leading-tight"></h2>
                    <p id="detailDescription" class="text-slate-600 leading-relaxed text-sm"></p>
                </div>
                <div class="mt-8 pt-6 border-t border-gray-100 grid grid-cols-2 gap-y-5 gap-x-4 text-xs">
                    <div><p class="text-[10px] font-black uppercase text-gray-400 mb-1">Condition</p><p id="detailStatus" class="font-bold text-slate-800"></p></div>
                    <div><p class="text-[10px] font-black uppercase text-gray-400 mb-1">Archived In</p><p id="detailCategoryLabel" class="font-bold text-slate-800"></p></div>
                    <div><p class="text-[10px] font-black uppercase text-gray-400 mb-1">Cataloged By</p><p id="detailAddedBy" class="font-bold text-slate-800"></p></div>
                    <div><p class="text-[10px] font-black uppercase text-gray-400 mb-1">Registration</p><p id="detailDate" class="font-bold text-slate-800"></p></div>
                </div>
                <button onclick="closeDetailModal()" class="mt-8 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all w-full uppercase text-[10px] tracking-widest shadow-lg shadow-blue-100">Close View</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXdGOgHeeoX2iqegUvpg5l-eF02SUE-Y",
            authDomain: "paf06-7d7cb.firebaseapp.com",
            projectId: "paf06-7d7cb",
            storageBucket: "paf06-7d7cb.firebasestorage.app",
            messagingSenderId: "661740924808",
            appId: "1:661740924808:web:6b00c1341f34e9eb81143d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sectionName = urlParams.get('section');
        if (!sectionName) window.location.href = 'exhibits.html';

        let allArtifacts = [];

        document.getElementById('sectionName').innerText = sectionName;
        document.getElementById('sectionTitleHeader').innerText = sectionName;
        document.title = `${sectionName} — PAF Museum`;

        // --- Status badge styles ---
        function statusStyle(status) {
            if (status === 'On Exhibit')      return 'bg-amber-500/90 text-white';
            if (status === 'In Storage')      return 'bg-emerald-500/90 text-white';
            if (status === 'Under Maintenance') return 'bg-blue-500/90 text-white';
            return 'bg-gray-500/90 text-white';
        }
        function statusCardStyle(status) {
            if (status === 'On Exhibit')      return 'bg-amber-50 text-amber-700';
            if (status === 'In Storage')      return 'bg-emerald-50 text-emerald-700';
            if (status === 'Under Maintenance') return 'bg-blue-50 text-blue-700';
            return 'bg-gray-50 text-gray-600';
        }

        // --- Modal ---
        window.openDetailModal = (id) => {
            const artifact = allArtifacts.find(a => a.id === id);
            if (!artifact) return;

            document.getElementById('detailImage').src = artifact.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image';
            document.getElementById('detailName').innerText = artifact.artifactName;
            document.getElementById('detailDescription').innerText = artifact.description || 'No description available.';
            document.getElementById('detailCategory').innerText = artifact.category;
            document.getElementById('detailCategoryLabel').innerText = artifact.category;
            document.getElementById('detailStatus').innerText = artifact.status;
            document.getElementById('detailAddedBy').innerText = artifact.addedBy || 'PAF Admin';

            const badge = document.getElementById('detailStatusBadge');
            badge.innerText = artifact.status;
            badge.className = `px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider backdrop-blur-sm ${statusStyle(artifact.status)}`;

            const date = artifact.timestamp
                ? artifact.timestamp.toDate().toLocaleDateString('en-PH', { month: 'long', year: 'numeric' })
                : 'N/A';
            document.getElementById('detailDate').innerText = date;

            const modal = document.getElementById('exhibitDetailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            requestAnimationFrame(() => modal.classList.add('show'));
            document.body.style.overflow = 'hidden';
        };

        window.closeDetailModal = () => {
            const modal = document.getElementById('exhibitDetailModal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.body.style.overflow = '';
            }, 220);
        };

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetailModal(); });
        document.getElementById('exhibitDetailModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeDetailModal();
        });

        // --- Section description ---
        onSnapshot(query(collection(db, "exhibitSections"), where("name", "==", sectionName)), (snapshot) => {
            if (!snapshot.empty) {
                const data = snapshot.docs[0].data();
                document.getElementById('sectionDesc').innerText = data.description || 'A curated collection from the PAF Museum archives.';
            }
        });

        // --- Artifacts ---
        onSnapshot(
            query(collection(db, "artifacts"), where("category", "==", sectionName)),
            (snapshot) => {
                const grid = document.getElementById('artifactsGrid');
                const counter = document.getElementById('artifactsCounter');
                allArtifacts = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.timestamp?.toMillis?.() ?? 0) - (a.timestamp?.toMillis?.() ?? 0));

                const total = allArtifacts.length;
                counter.innerText = total === 0
                    ? `No artifacts in "${sectionName}"`
                    : `${total} Artifact${total !== 1 ? 's' : ''} in ${sectionName}`;

                if (total === 0) {
                    grid.innerHTML = `<div class="col-span-full py-24 text-center text-gray-400"><div class="text-5xl mb-4">🏛️</div><p class="font-bold italic">No artifacts found in this collection yet.</p></div>`;
                    return;
                }

                grid.innerHTML = allArtifacts.map((a, i) => `
                    <div onclick="openDetailModal('${a.id}')"
                         class="artifact-card bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden cursor-pointer"
                         style="animation-delay:${i * 40}ms">
                        <div class="aspect-[4/3] overflow-hidden relative bg-gray-50">
                            <img src="${a.imageUrl || 'https://via.placeholder.com/400x300?text=No+Image'}"
                                 alt="${a.artifactName}" class="w-full h-full object-cover" loading="lazy">
                            <div class="absolute top-3 right-3">
                                <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase ${statusCardStyle(a.status)}">${a.status}</span>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-black text-slate-800 uppercase tracking-tight text-sm mb-1 line-clamp-1">${a.artifactName}</h3>
                            <p class="text-[10px] text-slate-400 font-semibold">Tap to view details →</p>
                        </div>
                    </div>
                `).join('');
            }
        );
    </script>
</body>
</html>

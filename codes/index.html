<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="icon" type="image/png" href="C:\Users\micha\Downloads\CANCHO\websitecode\imgs\PAF_Seal.png">
    <title>PAF AR Login</title>
    <style>
        /* 100% Accurate Custom Styling para sa Toast */
        .toastify {
            padding: 12px 24px;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .toast-success {
            background: linear-gradient(to right, #10b981, #059669) !important;
        }
        .toast-error {
            background: linear-gradient(to right, #ef4444, #dc2626) !important;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row w-full max-w-5xl overflow-hidden min-h-[600px]">
        
        <div class="w-full md:w-1/2 p-8 md:p-16 flex flex-col justify-center relative">
            <div class="mb-10">
                <h2 class="text-orange-500 font-bold text-xs uppercase tracking-widest leading-tight">
                    PAF <span class="text-blue-900">interactive<br>tour museum</span>
                </h2>
                <h1 class="text-red-600 font-extrabold text-xl tracking-tighter">AUGMENTED REALITY</h1>
            </div>

            <h3 class="text-4xl font-black text-slate-900 mb-8">Get started</h3>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                    <div class="text-right mt-2">
                        <a href="#" class="text-xs text-gray-500 hover:text-blue-600 font-semibold">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 shadow-lg shadow-blue-200 disabled:bg-blue-300">
                    Sign in
                </button>
            </form>
        </div>

        <div class="hidden md:flex w-1/2 bg-blue-600 relative overflow-hidden flex-col items-center justify-center p-12 text-center">
            <div class="absolute inset-0 opacity-40">
                <svg class="h-full w-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M0 20 L20 40 L40 10 L60 50 L80 20 L100 70" stroke="white" stroke-width="0.5" fill="none" />
                    <circle cx="20" cy="40" r="1" fill="white" />
                    <circle cx="40" cy="10" r="1" fill="white" />
                </svg>
            </div>

            <div class="z-10 absolute top-8 left-8">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-blue-900 overflow-hidden">
                    <img src="C:\Users\micha\Downloads\CANCHO\websitecode\imgs\PAF_Seal.png" alt="PAF Logo" class="w-[85%] h-[85%] object-contain">
                </div>
            </div>

            <div class="z-10 absolute top-8 right-8 bg-black/30 backdrop-blur-md px-4 py-1 rounded-full border border-white/20">
                <span class="text-white text-xs font-medium">admin</span>
            </div>

            <div class="z-10 mt-auto">
                <h2 class="text-white text-2xl font-semibold mb-1">PAF interactive tour museum</h2>
                <h1 class="text-white text-4xl font-black uppercase tracking-tight">AUGMENTED REALITY</h1>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXdGOgHeeoX2iqegUvpg5l-eF02SUE-Y",
            authDomain: "paf06-7d7cb.firebaseapp.com",
            projectId: "paf06-7d7cb",
            storageBucket: "paf06-7d7cb.firebasestorage.app",
            messagingSenderId: "661740924808",
            appId: "1:661740924808:web:6b00c1341f34e9eb81143d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        const AUTHORIZED_ADMIN = "admin_paf@gmail.com"; 

        // Toast Helper Function
        function showNotification(text, isSuccess) {
            Toastify({
                text: text,
                duration: 3000,
                gravity: "top", // top or bottom
                position: "right", // left, center or right
                className: isSuccess ? "toast-success" : "toast-error",
                stopOnFocus: true,
            }).showToast();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            loginBtn.disabled = true;
            loginBtn.innerText = "Checking...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email !== AUTHORIZED_ADMIN) {
                showNotification("Access Denied: Only the authorized Admin can access this panel.", false);
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign in";
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                showNotification("Login Successful! Welcome, Admin.", true);
                
                // Delay ng konti para makita ang success toast bago mag redirect
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1500);

            } catch (error) {
                console.error(error);
                let message = "Maling email o password.";
                
                if (error.code === 'auth/user-not-found') message = "User account not found.";
                if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') message = "Incorrect password or credentials.";
                
                showNotification("Login Failed: " + message, false);
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign in";
            }
        });
    </script>

</body>
</html>
